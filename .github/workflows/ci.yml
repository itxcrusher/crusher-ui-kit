name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build Tokens
        run: npm run build:tokens

      - name: Check Contrast
        run: npm run check:contrast

      - name: Build Library
        run: npm run build

      - name: Validate Package Contracts
        run: |
          node --input-type=module -e "const ids=['crusher-ui-kit','crusher-ui-kit/runtime','crusher-ui-kit/themes/glass.css','crusher-ui-kit/standalone']; for (const id of ids) { console.log(id, '->', import.meta.resolve(id)); }"
