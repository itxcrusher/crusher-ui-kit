name: Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - run: npm ci

      - name: Build Tokens
        run: npm run build:tokens

      - name: Check Contrast
        run: npm run check:contrast

      - name: Build Library
        run: npm run build

      - name: Validate Package Contracts
        run: npm run check:package

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          commit: chore: release crusher-ui-kit
          title: chore: release crusher-ui-kit
          version: npm run release:version
          publish: npm run release:publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
